services:
  web:
    build:
      context: .
    image: pompidou
    ports:
      - "3000:3000"
    env_file:
      - ".env.local"
    volumes:
      - "./:/app"
      - "/app/node_modules"
    depends_on:
      - espace-membre-db
      - primary-db
  primary-db:
    image: postgres:16
    volumes:
      - "./tmp/audit-db:/var/lib/postgresql/data"
    environment:
      POSTGRES_PASSWORD: "dummy"
      PGPORT: 5434
  espace-membre-db:
    image: postgres:16
    volumes:
      - "./tmp/espace-membre-db:/var/lib/postgresql/data"
    environment:
      POSTGRES_PASSWORD: "dummy"
      PGPORT: 5433
